<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXE GLOBAL — Partner Companies</title>
    <meta name="description" content="AXE GLOBAL partner companies and services." />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Professional CDN Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(145deg, #f7f8fa 0%, #eef0f3 100%);
            min-height: 100vh;
        }

        .font-display {
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-weight: 700;
        }

        .orange-bg {
            background: linear-gradient(135deg, #ef8300 0%, #f59e42 100%);
        }

        .orange-text {
            color: #ef8300;
        }

        .orange-border {
            border-color: #ef8300;
        }

        .orange-shadow {
            box-shadow: 0 20px 60px -20px rgba(239, 131, 0, 0.3), 0 8px 30px -8px rgba(0, 0, 0, 0.08);
        }

        .company-card {
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .company-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(239, 131, 0, 0.15);
            border-color: rgba(239, 131, 0, 0.15);
        }

        .company-card-beforward {
            background: #e8e9ec;
        }

        .company-card-beforward:hover {
            background: #dcdde0;
        }

        .company-card-automax {
            background: #d5d6d9;
        }

        .company-card-automax:hover {
            background: #c8c9cc;
        }

        .company-card-partner3 {
            background: #dedfe2;
        }

        .company-card-partner3:hover {
            background: #d0d1d5;
        }

        .logo-hero {
            background: linear-gradient(145deg, #02040a 0%, #0a1428 50%, #02040a 100%);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.03), 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .accent-stripe {
            background: linear-gradient(135deg, #ef8300 0%, #fbbf7a 100%);
        }

        .partner-logo-container {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .partner-logo-container img {
            max-height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            transition: all 0.3s ease;
        }

        .partner-logo-container img:hover {
            transform: scale(1.02);
        }

        .divider-gradient {
            background: linear-gradient(90deg, transparent, rgba(239, 131, 0, 0.15), transparent);
        }

        .badge-orange {
            background-color: rgba(239, 131, 0, 0.08);
            border-color: rgba(239, 131, 0, 0.25);
            color: #ef8300;
        }

        .website-card {
            background: linear-gradient(135deg, #ffffff 0%, #fcfcfd 100%);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .website-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(239, 131, 0, 0.15);
            border-color: rgba(239, 131, 0, 0.15);
        }

        /* Social Icons with Brand Colors */
        .social-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.04);
            text-decoration: none;
        }

        .social-icon svg {
            width: 22px;
            height: 22px;
        }

        .social-icon-instagram {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }

        .social-icon-instagram:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px -8px rgba(225, 48, 108, 0.4);
        }

        .social-icon-facebook {
            background: #1877f2;
            color: white;
        }

        .social-icon-facebook:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px -8px rgba(24, 119, 242, 0.4);
        }

        .social-icon-x {
            background: #000000;
            color: white;
        }

        .social-icon-x:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.3);
        }

        /* Remove text labels for partner cards */
        .partner-label {
            display: none;
        }
    </style>
</head>

<body>

    <div class="mx-auto w-full max-w-2xl px-4 py-8 sm:py-12">

        <!-- Main Card -->
        <div class="overflow-hidden rounded-[2.5rem] bg-white orange-shadow ring-1 ring-black/5">

            <!-- Top orange accent bar -->
            <div class="h-1.5 w-full accent-stripe"></div>

            <!-- Logo Section -->
            <div class="px-6 pt-6">
                <div class="relative w-full overflow-hidden rounded-2xl logo-hero" style="aspect-ratio: 4/2.5;">
                    <!-- Dotted overlay -->
                    <div aria-hidden="true" class="absolute inset-0 opacity-10"
                        style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size: 24px 24px;">
                    </div>
                    <!-- Logo -->
                    <div class="absolute inset-0 flex items-center justify-center p-4">
                        <img src="./log.png" alt="AXE GLOBAL logo"
                            class="h-[85%] w-[85%] max-h-[92%] max-w-[92%] object-contain drop-shadow-2xl" />
                    </div>
                </div>
            </div>

            <!-- Title Section -->
            <div class="px-6 pt-5 pb-3 text-center">
                <h2 class="font-display text-2xl font-bold tracking-wide text-gray-900">
                    Our Partner Companies
                </h2>
                <div class="mt-2 flex items-center justify-center gap-3">
                    <span class="h-px w-8 divider-gradient"></span>
                    <span class="text-xs font-medium uppercase tracking-[0.2em] text-gray-400">Trusted Partners</span>
                    <span class="h-px w-8 divider-gradient"></span>
                </div>
            </div>

            <!-- Partner Companies Grid - 3 cards in a row -->
            <div class="px-5 pb-4 pt-1">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">

                    <!-- Beforward -->
                    <a href="https://www.beforward.jp" target="_blank" rel="noopener"
                        class="company-card company-card-beforward p-3 flex flex-col items-center justify-center group">
                        <div class="partner-logo-container" style="height: 90px;">
                            <img src="./logo.svg" alt="Beforward" style="width:200px;height:auto;max-height:80px;" />
                        </div>
                        <span class="partner-label">Beforward</span>
                    </a>

                    <!-- Automax -->
                    <a href="https://www.automaxspace.com/" target="_blank" rel="noopener"
                        class="company-card company-card-automax p-3 flex flex-col items-center justify-center group">
                        <div class="partner-logo-container" style="height: 90px;">
                            <img src="https://automax.atomcards.co.tz/logo/logo.png" alt="Automax"
                                style="max-height:80px;width:auto;" />
                        </div>
                        <span class="partner-label">Automax</span>
                    </a>

                    <!-- Partner 3 -->
                    <a href="https://woodlands.co.ke" target="_blank" rel="noopener"
                        class="company-card company-card-partner3 p-3 flex flex-col items-center justify-center group">
                        <div class="partner-logo-container" style="height: 90px;">
                            <img src="./logo2.png" alt="Partner 3" style="max-height:80px;width:auto;" />
                        </div>
                        <span class="partner-label">Partner 3</span>
                    </a>
                </div>

                <!-- AXE GLOBAL Website (full width) -->
                <div class="mt-3">
                    <a href="https://www.axeglobalsarlu.com" target="_blank" rel="noopener"
                        class="website-card p-4 flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-12 rounded-xl orange-bg flex items-center justify-center text-white shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-globe"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                            </div>
                            <div>
                                <p
                                    class="text-sm font-semibold text-gray-800 group-hover:text-orange-500 transition-colors">
                                    www.axeglobalsarlu.com</p>
                                <p class="text-[11px] text-gray-400 font-medium">Official Website</p>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-up-right text-gray-300 group-hover:text-orange-500 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-all duration-200"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                    </a>
                </div>
            </div>

            <!-- Social Media Section -->
            <div class="px-6 pb-4 pt-3">
                <div class="flex items-center justify-center gap-4">
                    <span class="text-xs font-medium uppercase tracking-[0.15em] text-gray-400">Follow Us</span>
                    <span class="h-px w-12 divider-gradient"></span>
                </div>
                <div class="flex items-center justify-center gap-3 mt-3">
                    <!-- Instagram - Brand Color -->
                    <a href="#" target="_blank" rel="noopener" class="social-icon social-icon-instagram" aria-label="Instagram">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                    </a>
                    <!-- Facebook - Brand Color -->
                    <a href="#" target="_blank" rel="noopener" class="social-icon social-icon-facebook" aria-label="Facebook">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                    </a>
                    <!-- X (Twitter) - Brand Color -->
                    <a href="#" target="_blank" rel="noopener" class="social-icon social-icon-x" aria-label="X">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
                    </a>
                </div>
            </div>

            <!-- Footer Divider -->
            <div class="mx-6 h-px bg-gradient-to-r from-transparent via-gray-100 to-transparent"></div>

            <!-- Footer -->
            <div class="px-6 py-4 text-center">
                <p class="text-[11px] font-medium text-gray-400">
                    &copy; <span id="year"></span> AXE GLOBAL · All rights reserved
                </p>
            </div>
        </div>

        <footer class="mt-5 text-center">
            <p class="text-[11px] font-medium text-gray-400">
                Digital Partner Network
            </p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
